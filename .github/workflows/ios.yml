name: iOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-ios:
    name: iOS device-arm64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          {
            echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8"
            echo "kotlin.daemon.jvmargs=-Xmx2048M"
          } >> ~/.gradle/gradle.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Show installed Xcode
        run: |
          echo "===== macOS ====="
          sw_vers

          echo "===== Installed Xcodes ====="
          ls -1 /Applications | grep Xcode || true

          echo "===== Selecting newest Xcode ====="

          if [ -d "/Applications/Xcode_26.5.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

          xcodebuild -version

      - name: Build Kotlin framework
        run: |
          ./gradlew :shared:linkReleaseFrameworkIosArm64 \
            --no-configuration-cache \
            --stacktrace

      - name: Build iOS app
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/ios-device-arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Upload build products
        uses: actions/upload-artifact@v4
        with:
          name: Ciallo0FFF-ios-device-arm64
          path: build/ios-device-arm64/Build/Products
          if-no-files-found: error